name = "mealvue-ai-backend"
main = "src/index.ts"
compatibility_date = "2026-05-14"

[vars]
DEFAULT_PROVIDER = "cloudflare"
# Primary vision model: llama-4-scout is the most capable Cloudflare vision model (17B, multimodal)
CLOUDFLARE_MODEL = "@cf/meta/llama-4-scout-17b-16e-instruct"
# Fallback vision models for food image analysis (ordered by preference)
CLOUDFLARE_IMAGE_MODELS = "@cf/meta/llama-4-scout-17b-16e-instruct,@cf/google/gemma-4-26b-a4b-it,@cf/google/gemma-3-12b-it,@cf/mistralai/mistral-small-3.1-24b-instruct"
CLOUDFLARE_IMAGE_MODEL_TRIAL_REQUESTS = "10"
# Gemini direct API models (fallback chain: flash-lite first, then flash)
GEMINI_FALLBACK_MODEL = "gemini-2.5-flash-lite"
GEMINI_MODEL = "gemini-2.5-flash"
OPENROUTER_MODEL = "openrouter/free"

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "USAGE_COUNTER"
class_name = "UsageCounterObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UsageCounterObject"]

# Set secrets with:
# wrangler secret put GEMINI_API_KEY
# wrangler secret put OPENROUTER_API_KEY
# wrangler secret put MEALVUE_CLIENT_TOKEN
# wrangler secret put ADMIN_TOKEN
